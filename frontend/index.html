<!DOCTYPE html>
<html>
<head>
  <title>Supervisor Analyzer</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      max-width: 900px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    pre {
      margin-top: 20px;
      background: #000;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Supervisor Feedback Analyzer</h2>

  <textarea id="input" placeholder="Paste transcript here..."></textarea>

  <br>
  <button onclick="runAnalysis()">Run Analysis</button>

  <pre id="output"></pre>

</div>

<script>
async function runAnalysis() {
  const transcript = document.getElementById("input").value;
  const output = document.getElementById("output");

  output.innerText = "Analyzing...";

  const res = await fetch("http://localhost:5000/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ transcript })
  });

  const data = await res.json();

  output.innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
<h2>Supervisor Feedback Analyzer 🚀</h2>

<div id="loading">Analyzing... Please wait ⏳</div>
